version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: dyar_db
      POSTGRES_USER: dyar_user
      POSTGRES_PASSWORD: dyar_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://dyar_user:dyar_password@db:5432/dyar_db
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/app/frontend

volumes:
  postgres_data:
